<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Teste de Rádio Online</title>
    <style>
        body { background-color: #121212; color: white; text-align: center; font-family: Arial; padding: 20px; }
        .btn { background: #1db954; color: black; padding: 10px 20px; border: none; cursor: pointer; font-weight: bold; margin: 5px; }
        .box-anuncio { width: 1200px; height: 628px; border: 2px dashed #555; margin: 20px auto; background: #222; }
    </style>
</head>
<body>

    <h1>Teste do Player</h1>
    <p>Clique no botão abaixo para forçar o vídeo a carregar:</p>

    <div>
        <button class="btn" onclick="tocar('classica')">Ligar Rádio (Música Clássica)</button>
        <button class="btn" onclick="tocar('sertanejo')">Mudar para Sertanejo</button>
    </div>

    <br>
    <iframe id="meu-player" width="640" height="360" src="https://www.youtube.com/embed/WJ3-F02-F_4" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>

    <div class="box-anuncio">
        <p style="padding-top: 280px; color: #888;">Espaço do Patrocinador (1200x628px)</p>
    </div>

    <script>
        function tocar(estilo) {
            var player = document.getElementById('meu-player');
            if (estilo === 'classica') {
                // Vídeo de Música Clássica (Vivaldi)
                player.src = "https://www.youtube.com/embed/WJ3-F02-F_4?autoplay=1";
            } else {
                // Vídeo de Sertanejo (Jorge e Mateus)
                player.src = "https://www.youtube.com/embed/ePjTkU1Z9S0?autoplay=1";
            }
        }
    </script>
</body>
</html>
